<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Events - RAAS DANDIYA EVENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  
  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#gradient1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="url(#gradient1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="url(#gradient1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="gradient1" x1="2" y1="2" x2="22" y2="22">
              <stop stop-color="#8b5cf6"/>
              <stop offset="1" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
        </svg>
        RAAS DANDIYA EVENT
      </a>
      
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="tickets.html">My Tickets</a></li>
        <li><a href="profile.html" id="profileLink" style="display: none;">Profile</a></li>
      </ul>
      
      <div class="nav-actions">
        <button class="btn btn-ghost" id="loginBtn" onclick="window.location.href='login.html'" style="display: none;">
          Login
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
        <button class="btn btn-secondary" id="logoutBtn" onclick="handleLogout()" style="display: none;">
          Logout
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
        <button class="btn btn-primary" id="adminBtn" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <path d="M3 9h18M9 3v18"/>
          </svg>
          Admin
        </button>
        <button class="btn btn-primary" id="scannerBtn" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 7H5a2 2 0 00-2 2v5M16 7h3a2 2 0 012 2v5M9 17v1a2 2 0 002 2h2a2 2 0 002-2v-1M3 12h18"/>
          </svg>
          Scanner
        </button>
        <button class="btn btn-primary" onclick="window.location.href='tickets.html'" id="ticketsBtn">
          My Tickets
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 9a3 3 0 0 1 5-2.236A3 3 0 0 1 9.5 9a3 3 0 0 0 5.196 2.236A3 3 0 0 1 17 9a3 3 0 0 1 5 2.236V15a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9z"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile Navigation -->
  <nav class="mobile-nav">
    <div class="mobile-nav-items">
      <a href="index.html" class="mobile-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Home
      </a>
      <a href="events.html" class="mobile-nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Events
      </a>
      <a href="tickets.html" class="mobile-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 9a3 3 0 015-2.236A3 3 0 019.5 9a3 3 0 005.196 2.236A3 3 0 0117 9a3 3 0 015 2.236V15a2 2 0 01-2 2H4a2 2 0 01-2-2V9z"/>
          <path d="M2 17v2a2 2 0 002 2h16a2 2 0 002-2v-2"/>
        </svg>
        Tickets
      </a>
    </div>
  </nav>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Events Page -->
  <main class="page active">
    <div class="section" style="padding-top: 120px;">
      <div class="section-header">
        <span class="section-badge">Discover</span>
        <h2 class="section-title">All <span class="text-gradient">Events</span></h2>
        <p class="section-subtitle">Find your next unforgettable experience</p>
      </div>
      
      <!-- Filters -->
      <div class="filters-bar">
        <div class="filter-group">
          <label>Category:</label>
          <select class="filter-select" id="filter-category" onchange="applyFilters()">
            <option value="all">All Categories</option>
            <option value="concert">Concerts</option>
            <option value="garba">Garba Nights</option>
            <option value="party">Parties</option>
            <option value="tech">Tech Events</option>
            <option value="sports">Sports</option>
            <option value="comedy">Comedy</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Date:</label>
          <select class="filter-select" id="filter-date" onchange="applyFilters()">
            <option value="all">All Dates</option>
            <option value="today">Today</option>
            <option value="week">This Week</option>
            <option value="month">This Month</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Price:</label>
          <select class="filter-select" id="filter-price" onchange="applyFilters()">
            <option value="all">All Prices</option>
            <option value="free">Free</option>
            <option value="under50">Under $50</option>
            <option value="50to100">$50 - $100</option>
            <option value="over100">$100+</option>
          </select>
        </div>
        <div class="filter-chips">
          <button class="filter-chip active" onclick="setSort('popular')">🔥 Popular</button>
          <button class="filter-chip" onclick="setSort('upcoming')">📅 Upcoming</button>
          <button class="filter-chip" onclick="setSort('price-low')">💰 Price: Low</button>
          <button class="filter-chip" onclick="setSort('price-high')">💎 Price: High</button>
        </div>
      </div>
      
      <div class="events-grid" id="all-events-grid">
        <!-- Events populated by JS -->
      </div>
    </div>
  </main>

  <!-- Event Details Page -->
  <main id="event-details-page" class="page" style="display: none;">
    <div id="event-details-content"></div>
  </main>

  <!-- Checkout Page -->
  <main id="checkout-page" class="page" style="display: none;">
    <div style="max-width: 1000px; margin: 0 auto; padding: var(--space-2xl) var(--space-xl);">
      <button class="btn btn-secondary" style="margin-bottom: var(--space-lg);" onclick="window.history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </button>
      
      <div style="display: grid; grid-template-columns: 1fr 350px; gap: var(--space-2xl);">
        <div>
          <div id="checkout-content"></div>
        </div>
        <div style="height: fit-content;">
          <div class="glass-card" style="padding: var(--space-lg);">
            <h3 style="margin-bottom: var(--space-lg);">Order Progress</h3>
            <div id="progress-steps">
              <div id="step-1" class="progress-step active">
                <div class="step-number">1</div>
                <div class="step-label">Order Summary</div>
              </div>
              <div id="step-2" class="progress-step">
                <div class="step-number">2</div>
                <div class="step-label">Payment</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Confirmation Page -->
  <main id="confirmation-page" class="page" style="display: none;">
    <div id="confirmation-details" style="max-width: 800px; margin: 0 auto; padding: var(--space-3xl) var(--space-xl);"></div>
  </main>

  <script type="module" src="app.js"></script>
  <script>
    // Initialize events on page load
    document.addEventListener('DOMContentLoaded', () => {
      initParticles();
      renderEvents();
    });

    function initParticles() {
      const container = document.getElementById('particles');
      if (container) {
        for (let i = 0; i < 50; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 20 + 's';
          particle.style.animationDuration = (15 + Math.random() * 10) + 's';
          container.appendChild(particle);
        }
      }
    }

    function renderEvents() {
      const grid = document.getElementById('all-events-grid');
      const events = window.allEvents || [];
      if (!grid) return;

      grid.innerHTML = events.map(event => `
        <div class="event-card hover-lift" onclick="bookEvent('${event.id}')">
          <div class="event-image" style="background: linear-gradient(135deg, #8b5cf6, #06b6d4); height: 200px; display: flex; align-items: center; justify-content: center;">
            <span style="font-size: 3rem;">🎉</span>
          </div>
          <div class="event-info">
            <span class="event-category">${event.category || 'Event'}</span>
            <h3 class="event-title">${event.title}</h3>
            <div class="event-meta">
              <span>📅 ${new Date(event.date).toLocaleDateString()}</span>
              <span>⏰ ${event.time}</span>
            </div>
            <div class="event-meta">
              <span>📍 ${event.location}</span>
            </div>
            <div class="event-price">₹${event.basePrice || 0} onwards</div>
            <button class="btn btn-primary btn-sm" style="width: 100%;">Book Now</button>
          </div>
        </div>
      `).join('');
    }

    function bookEvent(eventId) {
      openEventDetails(eventId);
    }
  </script>

  <script type="module">
    import * as Auth from './auth.js';
    window.Auth = Auth;

    // Initialize auth listener
    Auth.initializeAuthStateListener();

    // Update nav buttons based on auth state
    window.addEventListener('authStateChanged', (event) => {
      const { user, role } = event.detail;
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const profileLink = document.getElementById('profileLink');

      if (user) {
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-flex';
        profileLink.style.display = 'inline';
      } else {
        loginBtn.style.display = 'inline-flex';
        logoutBtn.style.display = 'none';
        profileLink.style.display = 'none';
      }
    });

    window.handleLogout = async function() {
      const result = await Auth.logout();
      if (result.success) {
        window.location.href = 'index.html';
      }
    };
  </script>
</body>
</html>
